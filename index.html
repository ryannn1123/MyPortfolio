<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio | Light Blue Theme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1><i class="fas fa-code"></i> MyPortfolio</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
      <button id="themeToggle" class="theme-toggle" aria-label="Switch theme">
        <i class="fas fa-moon"></i>
      </button>
    </nav>
  </header>

  <section id="home" class="hero">
    <div class="profile-container">
      <div class="profile-image-wrapper">
        <img id="profileImage" src="https://ui-avatars.com/api/?background=0ea5e9&color=fff&rounded=true&size=160&bold=true&name=Your+Name" alt="Profile Picture">
        <label for="profileUpload" class="upload-icon">
          <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="profileUpload" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp" style="display: none;">
      </div>
    </div>
    <h2>Hello, I'm <span id="name">Ryan Carlo Lequin</span></h2>
    <p id="typing"></p>
    <div class="hero-buttons">
      <a href="#projects" class="btn-primary">View My Work</a>
      <a href="#contact" class="btn-secondary">Contact Me</a>
    </div>
  </section>

  <section id="projects">
    <h2><i class="fas fa-laptop-code"></i> My Projects</h2>
    <div class="projects" id="projectList"></div>
  </section>

  <section id="contact" class="contact">
    <h2><i class="fas fa-envelope"></i> Get In Touch</h2>
    <p class="contact-subtitle">I'd love to hear from you!</p>
    <input type="text" id="contactName" placeholder="Your Name">
    <input type="email" id="contactEmail" placeholder="Your Email">
    <textarea rows="5" id="contactMessage" placeholder="Your Message"></textarea>
    <button id="sendBtn">Send Message</button>
  </section>

  <footer>
    <p>© 2026 My Portfolio. Built with <i class="fas fa-heart" style="color: #60a5fa;"></i> </p>
  </footer>

  <div id="projectModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
